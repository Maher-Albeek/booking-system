spring.application.name=booking-system
app.storage.directory=data
app.photo-storage.directory=${app.storage.directory}/car-photos
app.payment.currency=${PAYMENT_CURRENCY:eur}
app.payment.stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
app.payment.stripe.secret-key=${STRIPE_SECRET_KEY:}
app.payment.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
app.security.jwt.secret=${JWT_SECRET:booking-system-dev-secret-change-me-please}
app.security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}
