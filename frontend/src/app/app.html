<main class="app-shell">
  <header class="app-chrome">
    <div class="brand-block">
      <img class="brand-logo" src="/favicon.ico" alt="Booking System logo" />
      <div class="brand-copy">
        <p class="eyebrow">Booking System</p>
        <strong>{{ pageTitle() }}</strong>
        <span>{{ pageSummary() }}</span>
      </div>
    </div>

    <nav class="route-switcher" aria-label="Main navigation">
      @for (link of navLinks(); track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="route-link"
        >
          {{ link.label }}
        </a>
      }
    </nav>

    <div class="session-shell">
      @if (auth.isAuthenticated()) {
        <span class="session-pill">
          <span class="avatar-circle">
            @if (auth.user()?.avatarUrl) {
              <img [src]="auth.user()?.avatarUrl" alt="User avatar" />
            } @else {
              <span>{{ userInitials() }}</span>
            }
          </span>
          <span class="session-copy">
            <strong>{{ auth.user()?.name }}</strong>
            <small>{{ roleLabel() }}</small>
          </span>
        </span>

        <button type="button" class="logout-button" (click)="logout()">Logout</button>
      } @else {
        <span class="guest-pill">Guest mode</span>
      }
    </div>
  </header>

  <router-outlet></router-outlet>
</main>
