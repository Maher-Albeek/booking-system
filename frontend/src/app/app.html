<main class="app-shell">
  @if (auth.isAuthenticated()) {
    <header class="app-chrome">
      <div class="brand-block">
        <p class="eyebrow">Booking System</p>
        <strong>{{ pageTitle() }}</strong>
        <span>{{ pageSummary() }}</span>
      </div>

      <nav class="route-switcher" aria-label="Interface switcher">
        <a routerLink="/user" routerLinkActive="active" class="route-link">User Page</a>
        @if (auth.isAdmin()) {
          <a routerLink="/admin" routerLinkActive="active" class="route-link">Admin Page</a>
        }
      </nav>

      <div class="session-chip">
        <span>{{ auth.user()?.name }}</span>
        <strong>{{ auth.user()?.role === 'ADMIN' ? 'Administrator' : 'Customer' }}</strong>
        <button type="button" class="logout-button" (click)="logout()">Logout</button>
      </div>
    </header>
  }

  <router-outlet></router-outlet>
</main>
