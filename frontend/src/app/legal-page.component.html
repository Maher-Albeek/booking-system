<main class="legal-shell">
  <section class="legal-card">
    <p class="eyebrow">{{ i18n.t('legal.eyebrow') }}</p>
    <h1>{{ title() }}</h1>
    <p class="summary">{{ summary() }}</p>

    <dl class="legal-grid">
      @for (field of fieldsForCurrentPage(); track $index) {
        <div>
          <dt>{{ field.label }}</dt>
          <dd>{{ field.value }}</dd>
        </div>
      } @empty {
        <div>
          <dt>{{ i18n.t('common.notSet') }}</dt>
          <dd>{{ i18n.t('common.notSet') }}</dd>
        </div>
      }
    </dl>
  </section>
</main>
